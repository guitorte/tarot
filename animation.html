<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarô — Arcanos Maiores</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #08080d;
            color: #fff;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- BACKGROUND COLOR BLOBS ---- */
        .bg-blobs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
        }

        .blob-1 {
            width: 640px; height: 640px;
            background: radial-gradient(circle, rgba(192, 38, 211, 0.2) 0%, transparent 70%);
            top: -180px; right: -120px;
        }

        .blob-2 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.14) 0%, transparent 70%);
            bottom: -120px; right: 80px;
        }

        .blob-3 {
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.13) 0%, transparent 70%);
            bottom: -60px; left: -80px;
        }

        /* ---- HEADER ---- */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 30;
        }

        .logo {
            font-size: 0.78rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
        }

        .header-nav {
            display: flex;
            gap: 22px;
            list-style: none;
        }

        .header-nav a {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            letter-spacing: 0.06em;
            transition: color 0.2s;
        }

        .header-nav a:hover { color: rgba(255, 255, 255, 0.85); }

        /* ---- LEFT TEXT PANEL ---- */
        .text-panel {
            position: fixed;
            left: 6%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            max-width: 290px;
        }

        .text-panel h1 {
            font-size: clamp(2rem, 3.6vw, 3.6rem);
            line-height: 1.08;
            font-weight: 400;
            letter-spacing: -0.025em;
            margin-bottom: 14px;
        }

        .text-panel p {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.72;
            margin-bottom: 26px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            max-width: 230px;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffffff;
            color: #08080d;
            border: none;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.74rem;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            cursor: pointer;
            letter-spacing: 0.04em;
            font-weight: 500;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .cta-btn:hover {
            transform: scale(1.04);
            opacity: 0.9;
        }

        /* ---- 3D SCENE ---- */
        .scene {
            position: fixed;
            inset: 0;
            /* Perspective creates the depth effect */
            perspective: 920px;
            perspective-origin: 54% 50%;
            z-index: 5;
        }

        .orbit {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            /*
             * rotateX(-22deg): tips orbit plane so front is lower, back is higher
             * rotateZ(-14deg): tilts the oval diagonally → creates left-to-right sweep
             */
            transform: rotateX(-22deg) rotateZ(-14deg);
        }

        /* ---- TAROT CARD ---- */
        .card {
            position: absolute;
            /* Card dimensions: tarot ratio is roughly 2:3.5 */
            width: 86px;
            height: 148px;
            top: 50%;
            left: 50%;
            margin-top: -74px;
            margin-left: -43px;
            transform-style: preserve-3d;
            will-change: transform, opacity;
            cursor: pointer;
            transition: filter 0.3s ease;
        }

        .card:hover .card-face {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .card-face {
            width: 100%;
            height: 100%;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.65),
                0 2px 6px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 6px 9px;
            position: relative;
            overflow: hidden;
            /* Gradient is set per-card via inline style */
            background: linear-gradient(155deg, #1e1535 0%, #0e0c1c 55%, #150e28 100%);
        }

        /* Reflective sheen */
        .card-face::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                140deg,
                rgba(255, 255, 255, 0.05) 0%,
                transparent 45%,
                rgba(255, 255, 255, 0.02) 100%
            );
            border-radius: inherit;
            pointer-events: none;
        }

        /* Corner ornaments */
        .cc {
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: rgba(255, 255, 255, 0.18);
            border-style: solid;
        }

        .cc-tl { top: 6px;    left: 6px;   border-width: 1px 0 0 1px; }
        .cc-tr { top: 6px;    right: 6px;  border-width: 1px 1px 0 0; }
        .cc-bl { bottom: 6px; left: 6px;   border-width: 0 0 1px 1px; }
        .cc-br { bottom: 6px; right: 6px;  border-width: 0 1px 1px 0; }

        .card-num {
            font-size: 0.38rem;
            letter-spacing: 0.22em;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 400;
            align-self: flex-start;
            padding-left: 3px;
        }

        .card-symbol {
            font-size: 1.75rem;
            line-height: 1;
        }

        .card-name {
            font-size: 0.34rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.13em;
            text-transform: uppercase;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 400;
            line-height: 1.4;
            padding: 0 2px;
        }

        /* ---- BOTTOM NAV DOTS ---- */
        .nav-dots {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 30;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .dot.active {
            background: rgba(255, 255, 255, 0.8);
            width: 18px;
            border-radius: 3px;
        }

        /* Fade edges of scene so cards don't hard-clip */
        .scene-mask {
            position: fixed;
            inset: 0;
            z-index: 15;
            pointer-events: none;
            background:
                linear-gradient(to right, #08080d 0%, transparent 18%, transparent 82%, #08080d 100%),
                linear-gradient(to bottom, #08080d 0%, transparent 14%, transparent 86%, #08080d 100%);
        }
    </style>
</head>
<body>

    <!-- Background blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Header -->
    <header>
        <span class="logo">Tarô</span>
        <nav>
            <ul class="header-nav">
                <li><a href="#">Arcanos</a></li>
                <li><a href="#">Leitura</a></li>
                <li><a href="#">Combinações</a></li>
            </ul>
        </nav>
    </header>

    <!-- Left text panel -->
    <div class="text-panel">
        <h1>Cada carta,<br>uma história.</h1>
        <p>Explore os 22 arcanos maiores e descubra as combinações ocultas entre eles.</p>
        <button class="cta-btn">Iniciar leitura →</button>
    </div>

    <!-- Edge fade mask -->
    <div class="scene-mask"></div>

    <!-- 3D card orbit scene -->
    <div class="scene">
        <div class="orbit" id="orbit"></div>
    </div>

    <!-- Bottom nav dots -->
    <div class="nav-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <script>
        // ---- Card data (22 Major Arcana) ----
        const ARCANA = [
            { num: '0',      name: 'O Louco',          symbol: '🌀', hue: 200 },
            { num: 'I',      name: 'O Mago',            symbol: '⚡', hue: 260 },
            { num: 'II',     name: 'A Papisa',          symbol: '🌙', hue: 220 },
            { num: 'III',    name: 'A Imperatriz',      symbol: '🌺', hue: 320 },
            { num: 'IV',     name: 'O Imperador',       symbol: '♛',  hue: 0   },
            { num: 'V',      name: 'O Hierofante',      symbol: '✦',  hue: 40  },
            { num: 'VI',     name: 'Os Amantes',        symbol: '♡',  hue: 350 },
            { num: 'VII',    name: 'O Carro',           symbol: '◈',  hue: 30  },
            { num: 'VIII',   name: 'A Justiça',         symbol: '⚖',  hue: 200 },
            { num: 'IX',     name: 'O Eremita',         symbol: '◎',  hue: 180 },
            { num: 'X',      name: 'Roda da Fortuna',   symbol: '⊕',  hue: 270 },
            { num: 'XI',     name: 'A Força',           symbol: '∞',  hue: 50  },
            { num: 'XII',    name: 'O Enforcado',       symbol: '△',  hue: 190 },
            { num: 'XIII',   name: 'A Morte',           symbol: '✕',  hue: 240 },
            { num: 'XIV',    name: 'A Temperança',      symbol: '≈',  hue: 170 },
            { num: 'XV',     name: 'O Diabo',           symbol: '◆',  hue: 10  },
            { num: 'XVI',    name: 'A Torre',           symbol: '▲',  hue: 20  },
            { num: 'XVII',   name: 'A Estrela',         symbol: '★',  hue: 210 },
            { num: 'XVIII',  name: 'A Lua',             symbol: '☽',  hue: 250 },
            { num: 'XIX',    name: 'O Sol',             symbol: '☀',  hue: 45  },
            { num: 'XX',     name: 'O Julgamento',      symbol: '♩',  hue: 280 },
            { num: 'XXI',    name: 'O Mundo',           symbol: '◉',  hue: 150 },
        ];

        const N   = ARCANA.length;
        const RX  = 490;   // orbit radius — horizontal spread
        const RZ  = 320;   // orbit radius — depth
        const orbit = document.getElementById('orbit');

        // Randomised per-card tilt offsets (frozen after creation)
        const perCard = ARCANA.map(() => ({
            rx: (Math.random() - 0.5) * 26,   // tilt forward/back
            rz: (Math.random() - 0.5) * 16,   // tilt left/right
            ry: (Math.random() - 0.5) * 12,   // face angle variation
            yOff: (Math.random() - 0.5) * 28, // slight height scatter
        }));

        // Build DOM
        const cardEls = ARCANA.map((data, i) => {
            const el = document.createElement('div');
            el.className = 'card';

            // Subtle hue tint per card
            const h = data.hue;
            el.innerHTML = `
                <div class="card-face" style="background: linear-gradient(155deg,
                    hsl(${h}, 40%, 13%) 0%,
                    hsl(${h + 20}, 30%, 8%) 55%,
                    hsl(${h - 10}, 35%, 11%) 100%);">
                    <div class="cc cc-tl"></div>
                    <div class="cc cc-tr"></div>
                    <div class="cc cc-bl"></div>
                    <div class="cc cc-br"></div>
                    <div class="card-num">${data.num}</div>
                    <div class="card-symbol">${data.symbol}</div>
                    <div class="card-name">${data.name}</div>
                </div>
            `;
            orbit.appendChild(el);
            return el;
        });

        // ---- Animation loop ----
        function animate(ts) {
            // One full orbit every 16 seconds
            const angle = (ts / 16000) * Math.PI * 2;

            cardEls.forEach((el, i) => {
                const t = angle + (i / N) * Math.PI * 2;

                const x = Math.cos(t) * RX;
                const z = Math.sin(t) * RZ;
                const y = perCard[i].yOff;

                // zNorm: -1 = farthest back, +1 = closest front
                const zNorm = Math.sin(t);

                // Opacity: front cards fully visible, back cards faint
                const opacity = Math.max(0.1, 0.2 + 0.8 * ((zNorm + 1) / 2));

                // Subtle z-index so front cards layer on top correctly
                el.style.zIndex = Math.round((zNorm + 1) * 100);
                el.style.opacity = opacity;
                el.style.transform = [
                    `translate3d(${x}px, ${y}px, ${z}px)`,
                    `rotateX(${perCard[i].rx}deg)`,
                    `rotateY(${perCard[i].ry}deg)`,
                    `rotateZ(${perCard[i].rz}deg)`,
                ].join(' ');
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
