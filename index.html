<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Tarô Quebrado — leitor de combinações de cartas de tarô. Explore as cinco dinâmicas ocultas entre cada par.">
    <meta name="theme-color" content="#ffffff">
    <title>Tarô Quebrado</title>
    <style>
        /* ===========================================
           DESIGN TOKENS
           =========================================== */
        :root {
            --white: #ffffff;
            --black: #111111;
            --gray-1: #1a1a1a;
            --gray-2: #333333;
            --gray-3: #555555;
            --gray-4: #888888;
            --gray-5: #aaaaaa;
            --gray-6: #cccccc;
            --gray-7: #e5e5e5;
            --gray-8: #f2f2f2;
            --gray-9: #f9f9f9;
            --danger: #c00;

            --serif: 'Georgia', 'Times New Roman', 'Baskerville', serif;
            --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;

            --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
        }

        /* ===========================================
           RESET
           =========================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; -webkit-text-size-adjust: 100%; }
        body {
            height: 100%;
            font-family: var(--serif);
            color: var(--black);
            background: var(--white);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        button:focus-visible, input:focus-visible { outline: 2px solid var(--black); outline-offset: 2px; }
        input { font-family: var(--sans); }

        /* ===========================================
           LAYOUT SHELL
           =========================================== */
        #app {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        #app.visible { display: flex; }

        .app-header {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--gray-7);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            background: var(--white);
        }

        .app-header h1 {
            font-family: var(--sans);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3.5px;
            font-weight: 400;
        }

        .hdr-btn {
            position: absolute;
            width: 44px; height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .hdr-btn:hover { background: var(--gray-8); }
        .hdr-btn svg { width: 18px; height: 18px; stroke: var(--black); stroke-width: 1.5; fill: none; }
        .hdr-left { left: 4px; }
        .hdr-right { right: 4px; }

        .app-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ===========================================
           SIDEBAR (Desktop ≥1024px only)
           =========================================== */
        .sidebar {
            display: none;
            width: 320px;
            flex-shrink: 0;
            border-right: 1px solid var(--gray-7);
            flex-direction: column;
            background: var(--white);
        }

        .sb-header {
            padding: 20px 24px 0;
        }

        .sb-label {
            font-family: var(--sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gray-4);
            margin-bottom: 12px;
        }

        .sb-active-hint {
            font-family: var(--sans);
            font-size: 0.65rem;
            color: var(--black);
            background: var(--gray-8);
            padding: 6px 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
            letter-spacing: 0.3px;
        }
        .sb-active-hint.visible { display: block; }

        .sb-search {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid var(--gray-7);
            font-size: 0.85rem;
            color: var(--black);
            background: transparent;
            letter-spacing: 0.2px;
        }
        .sb-search::placeholder { color: var(--gray-5); }

        .sb-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 14px 24px;
            border-bottom: 1px solid var(--gray-7);
        }

        .sb-filter-btn {
            padding: 5px 12px;
            border: 1px solid var(--gray-7);
            border-radius: 20px;
            font-family: var(--sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--gray-3);
            transition: all 150ms ease;
        }
        .sb-filter-btn:hover { border-color: var(--gray-4); }
        .sb-filter-btn.active {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .sb-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .sb-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 12px 24px 24px;
        }

        .sb-card-btn {
            padding: 10px 6px;
            border: 1px solid var(--gray-7);
            border-radius: 4px;
            font-size: 0.8rem;
            text-align: center;
            line-height: 1.25;
            transition: all 120ms ease;
            position: relative;
        }
        .sb-card-btn:hover { border-color: var(--gray-4); background: var(--gray-9); }
        .sb-card-btn:active { transform: scale(0.97); }
        .sb-card-btn.in-use {
            border-color: var(--black);
            font-weight: 600;
        }
        .sb-card-btn.in-use::after {
            content: '';
            position: absolute;
            top: 4px; right: 4px;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--black);
        }

        .sb-divider {
            height: 1px;
            background: var(--gray-7);
            margin: 0 24px;
        }

        .sb-history-section {
            padding: 16px 24px 24px;
        }

        .sb-history-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-8);
            transition: opacity 120ms;
        }
        .sb-history-item:hover { opacity: 0.6; }
        .sb-history-pair {
            font-size: 0.82rem;
            line-height: 1.3;
        }
        .sb-history-pair .arr { color: var(--gray-5); }
        .sb-history-time {
            font-family: var(--sans);
            font-size: 0.6rem;
            color: var(--gray-5);
            margin-top: 2px;
        }

        .sb-empty {
            color: var(--gray-5);
            font-family: var(--sans);
            font-size: 0.75rem;
            text-align: center;
            padding: 24px;
        }

        /* ===========================================
           CONTENT AREA
           =========================================== */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* ===========================================
           ORACLE (Card Slots) — always visible
           =========================================== */
        .oracle {
            flex-shrink: 0;
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--gray-7);
            background: var(--white);
            position: relative;
            z-index: 5;
        }

        .oracle-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            max-width: 440px;
            margin: 0 auto;
        }

        .slot {
            flex: 1;
            max-width: 170px;
            text-align: center;
            padding: 10px 8px;
            border: 1.5px dashed var(--gray-6);
            border-radius: 8px;
            cursor: pointer;
            transition: all 200ms var(--ease-out);
            position: relative;
            min-height: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .slot:hover { border-color: var(--gray-4); }

        .slot.filled {
            border-style: solid;
            border-color: var(--gray-6);
            background: var(--gray-9);
        }
        .slot.filled:hover { border-color: var(--gray-3); }

        .slot.active {
            border-color: var(--black);
            border-style: solid;
            box-shadow: 0 0 0 1px var(--black);
        }

        .slot-label {
            font-family: var(--sans);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray-5);
            margin-bottom: 2px;
        }

        .slot-name {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.2;
            display: none;
        }

        .slot.filled .slot-name { display: block; }

        .slot-empty {
            font-family: var(--sans);
            font-size: 0.65rem;
            color: var(--gray-5);
        }
        .slot.filled .slot-empty { display: none; }

        .slot-x {
            position: absolute;
            top: -7px; right: -7px;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--gray-2);
            color: var(--white);
            font-size: 0.65rem;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: var(--sans);
            line-height: 1;
            z-index: 2;
        }
        .slot.filled .slot-x { display: flex; }
        .slot-x:hover { background: var(--danger); }

        .oracle-mid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .oracle-arrow {
            font-family: var(--sans);
            font-size: 1.1rem;
            color: var(--gray-5);
            line-height: 1;
        }

        .swap-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 1px solid var(--gray-7);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 150ms ease;
            opacity: 0;
            pointer-events: none;
        }
        .swap-btn.active { opacity: 1; pointer-events: all; }
        .swap-btn.active:hover {
            background: var(--black);
            border-color: var(--black);
        }
        .swap-btn.active:hover svg { stroke: var(--white); }
        .swap-btn svg { width: 12px; height: 12px; stroke: var(--gray-3); stroke-width: 1.5; fill: none; }

        .oracle-hint {
            text-align: center;
            margin-top: 8px;
        }
        .oracle-random {
            font-family: var(--sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-5);
            transition: color 150ms;
        }
        .oracle-random:hover { color: var(--black); }

        /* ===========================================
           READING SCROLL AREA
           =========================================== */
        .reading-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .reading-inner {
            max-width: 620px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* --- Empty state --- */
        .empty {
            text-align: center;
            padding: 60px 24px 40px;
        }

        .empty-mark {
            width: 48px; height: 48px;
            margin: 0 auto 24px;
            border: 1.5px solid var(--gray-7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--sans);
            font-size: 1rem;
            color: var(--gray-5);
        }

        .empty h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .empty p {
            font-family: var(--sans);
            font-size: 0.82rem;
            color: var(--gray-4);
            line-height: 1.7;
            max-width: 300px;
            margin: 0 auto 28px;
        }

        .empty-cta {
            display: inline-block;
            font-family: var(--sans);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: var(--black);
            color: var(--white);
            padding: 14px 32px;
            border-radius: 28px;
            transition: opacity 150ms;
        }
        .empty-cta:hover { opacity: 0.8; }

        .empty-or {
            display: block;
            font-family: var(--sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-5);
            margin-top: 16px;
        }

        .empty-random {
            font-family: var(--sans);
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            color: var(--gray-4);
            margin-top: 8px;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .empty-random:hover { color: var(--black); }

        /* --- Partial state (one card) --- */
        .partial {
            text-align: center;
            padding: 60px 24px;
        }
        .partial p {
            font-size: 1.15rem;
            color: var(--gray-4);
            font-style: italic;
            line-height: 1.6;
        }

        /* --- Reading header --- */
        .rdg-header {
            text-align: center;
            padding: 40px 0 32px;
            border-bottom: 1px solid var(--gray-7);
        }

        .rdg-kicker {
            font-family: var(--sans);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--gray-5);
            margin-bottom: 12px;
        }

        .rdg-pair {
            font-size: 1.5rem;
            font-weight: 400;
            line-height: 1.35;
        }
        .rdg-pair .arr {
            display: inline-block;
            color: var(--gray-5);
            margin: 0 6px;
            font-family: var(--sans);
            font-size: 0.9rem;
        }

        .rdg-sub {
            font-family: var(--sans);
            font-size: 0.6rem;
            color: var(--gray-5);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* --- Dynamic sections --- */
        .dyn {
            padding: 32px 0;
            border-bottom: 1px solid var(--gray-7);
        }
        .dyn:last-of-type { border-bottom: none; }

        .dyn-kicker {
            font-family: var(--sans);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--gray-5);
            margin-bottom: 6px;
        }

        .dyn-title {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 16px;
            color: var(--black);
        }

        .dyn-text {
            font-size: 1.05rem;
            line-height: 1.9;
            color: var(--gray-2);
        }

        /* --- Explore (related) section --- */
        .explore-section {
            padding: 40px 0 24px;
            border-top: 1px solid var(--gray-7);
            margin-top: 8px;
        }

        .explore-title {
            font-family: var(--sans);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--gray-5);
            margin-bottom: 24px;
            text-align: center;
        }

        .explore-swap {
            display: block;
            width: 100%;
            text-align: center;
            padding: 16px;
            border: 1px solid var(--gray-7);
            border-radius: 8px;
            margin-bottom: 24px;
            transition: all 150ms;
        }
        .explore-swap:hover {
            border-color: var(--black);
            background: var(--gray-9);
        }
        .explore-swap-label {
            font-family: var(--sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray-5);
            margin-bottom: 4px;
        }
        .explore-swap-pair {
            font-size: 1rem;
        }

        .explore-group {
            margin-bottom: 20px;
        }

        .explore-group-title {
            font-family: var(--sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-4);
            margin-bottom: 10px;
        }

        .explore-links {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .explore-link {
            font-family: var(--sans);
            font-size: 0.75rem;
            padding: 7px 14px;
            border: 1px solid var(--gray-7);
            border-radius: 20px;
            transition: all 120ms;
            white-space: nowrap;
        }
        .explore-link:hover {
            border-color: var(--black);
            background: var(--gray-9);
        }

        /* ===========================================
           MOBILE PICKER (Full-screen overlay)
           =========================================== */
        .picker-overlay {
            position: fixed;
            inset: 0;
            background: var(--white);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 300ms var(--ease-spring);
        }
        .picker-overlay.open {
            transform: translateY(0);
        }

        .picker-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-7);
            gap: 12px;
            flex-shrink: 0;
        }

        .picker-back {
            width: 36px; height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .picker-back:hover { background: var(--gray-8); }
        .picker-back svg { width: 18px; height: 18px; stroke: var(--black); stroke-width: 1.5; fill: none; }

        .picker-title {
            font-family: var(--sans);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            flex: 1;
        }

        .picker-search-row {
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-7);
            flex-shrink: 0;
        }

        .picker-search {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid var(--gray-7);
            font-size: 0.9rem;
            color: var(--black);
            background: transparent;
        }
        .picker-search::placeholder { color: var(--gray-5); }

        .picker-filters {
            display: flex;
            overflow-x: auto;
            padding: 12px 16px;
            gap: 8px;
            flex-shrink: 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            border-bottom: 1px solid var(--gray-7);
        }
        .picker-filters::-webkit-scrollbar { display: none; }

        .pk-filter {
            white-space: nowrap;
            padding: 6px 14px;
            border: 1px solid var(--gray-7);
            border-radius: 20px;
            font-family: var(--sans);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--gray-3);
            transition: all 120ms;
            flex-shrink: 0;
        }
        .pk-filter:hover { border-color: var(--gray-4); }
        .pk-filter.active {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .picker-grid-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .picker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            padding: 16px;
        }

        .pk-card {
            padding: 14px 8px;
            border: 1px solid var(--gray-7);
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.25;
            transition: all 100ms;
            position: relative;
        }
        .pk-card:hover { border-color: var(--gray-4); background: var(--gray-9); }
        .pk-card:active { transform: scale(0.96); }
        .pk-card.in-use {
            border-color: var(--black);
            font-weight: 600;
        }
        .pk-card.in-use::after {
            content: '';
            position: absolute;
            top: 4px; right: 4px;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--black);
        }

        .pk-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 32px;
            color: var(--gray-5);
            font-family: var(--sans);
            font-size: 0.8rem;
        }

        /* ===========================================
           HISTORY PANEL (Mobile slide-over)
           =========================================== */
        .history-shade {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 250ms;
        }
        .history-shade.open { opacity: 1; pointer-events: all; }

        .history-panel {
            position: fixed;
            top: 0; left: 0;
            width: 300px;
            max-width: 80vw;
            height: 100%;
            background: var(--white);
            z-index: 91;
            transform: translateX(-100%);
            transition: transform 300ms var(--ease-spring);
            display: flex;
            flex-direction: column;
        }
        .history-shade.open .history-panel { transform: translateX(0); }

        .hist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px;
            border-bottom: 1px solid var(--gray-7);
        }
        .hist-title {
            font-family: var(--sans);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .hist-clear {
            font-family: var(--sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-5);
        }
        .hist-clear:hover { color: var(--danger); }

        .hist-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 20px;
        }

        .hist-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-8);
            transition: opacity 120ms;
        }
        .hist-item:hover { opacity: 0.6; }
        .hist-pair {
            font-size: 0.85rem;
            line-height: 1.3;
        }
        .hist-pair .arr { color: var(--gray-5); }
        .hist-time {
            font-family: var(--sans);
            font-size: 0.6rem;
            color: var(--gray-5);
            margin-top: 2px;
        }

        .hist-empty {
            padding: 32px 0;
            text-align: center;
            color: var(--gray-5);
            font-family: var(--sans);
            font-size: 0.8rem;
        }

        /* ===========================================
           TOAST
           =========================================== */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--gray-1);
            color: var(--white);
            font-family: var(--sans);
            font-size: 0.72rem;
            letter-spacing: 0.3px;
            padding: 10px 24px;
            border-radius: 24px;
            opacity: 0;
            pointer-events: none;
            transition: all 250ms var(--ease-out);
            z-index: 200;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===========================================
           LOADER
           =========================================== */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 500ms;
        }
        #loader.out { opacity: 0; pointer-events: none; }

        .ld-title {
            font-family: var(--sans);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3.5px;
            margin-bottom: 28px;
        }
        .ld-track {
            width: 100px; height: 1px;
            background: var(--gray-7);
            position: relative;
            overflow: hidden;
        }
        .ld-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 0%;
            background: var(--black);
            transition: width 150ms linear;
        }
        .ld-status {
            font-family: var(--sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray-5);
            margin-top: 16px;
        }

        /* ===========================================
           ONBOARDING
           =========================================== */
        .onboard-shade {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 400ms;
        }
        .onboard-shade.show { opacity: 1; pointer-events: all; }

        .onboard-card {
            background: var(--white);
            border-radius: 12px;
            padding: 40px 32px;
            max-width: 340px;
            width: 88%;
            text-align: center;
        }
        .onboard-kicker {
            font-family: var(--sans);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--gray-5);
            margin-bottom: 16px;
        }
        .onboard-title {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 12px;
        }
        .onboard-text {
            font-family: var(--sans);
            font-size: 0.8rem;
            color: var(--gray-3);
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .onboard-btn {
            font-family: var(--sans);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: var(--black);
            color: var(--white);
            padding: 12px 28px;
            border-radius: 24px;
        }
        .onboard-btn:hover { opacity: 0.85; }

        /* ===========================================
           FADE-IN ANIMATION for dynamics
           =========================================== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .dyn { animation: fadeUp 400ms var(--ease-out) both; }
        .dyn:nth-child(2) { animation-delay: 80ms; }
        .dyn:nth-child(3) { animation-delay: 160ms; }
        .dyn:nth-child(4) { animation-delay: 240ms; }
        .dyn:nth-child(5) { animation-delay: 320ms; }

        .explore-section { animation: fadeUp 400ms var(--ease-out) 400ms both; }

        /* ===========================================
           RESPONSIVE — Desktop ≥1024px
           =========================================== */
        @media (min-width: 1024px) {
            .sidebar { display: flex; }
            .hdr-left { display: none; }

            .oracle {
                padding: 24px 24px 16px;
            }
            .oracle-row { gap: 20px; max-width: 480px; }
            .slot {
                max-width: 190px;
                padding: 14px 12px;
                min-height: 64px;
            }
            .slot-name { font-size: 1.05rem; }

            .reading-inner {
                padding: 0 32px 96px;
            }
            .rdg-pair { font-size: 1.7rem; }
            .dyn-title { font-size: 1.3rem; }
            .dyn-text { font-size: 1.1rem; }

            .picker-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        /* ===========================================
           PRINT
           =========================================== */
        @media print {
            .app-header, .oracle, .sidebar, .picker-overlay, .history-shade, .toast, .onboard-shade, .explore-section { display: none !important; }
            .reading-scroll { overflow: visible; }
            body, #app, .app-body, .content { height: auto; overflow: visible; }
            .reading-inner { padding: 0; max-width: 100%; }
            .dyn { animation: none; break-inside: avoid; }
        }
    </style>
</head>

            Escolha duas cartas para revelar as cinco dinâmicas ocultas entre elas.
            A ordem importa — cada direção conta uma história diferente.

<script>
/* ================================================
   DATA LAYER
   ================================================ */
let cardsById = new Map();
let cardsList = [];
let interactions = new Map(); // "id1:id2" -> dynamics obj

function catOf(id) {
    const n = +id;
    if (n <= 22) return 'maiores';
    if (n <= 36) return 'copas';
    if (n <= 50) return 'paus';
    if (n <= 64) return 'espadas';
    return 'ouros';
}

function norm(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

const CATS = [
    { key: 'todos',   label: 'Todos' },
    { key: 'maiores', label: 'Arcanos Maiores' },
    { key: 'copas',   label: 'Copas' },
    { key: 'paus',    label: 'Paus' },
    { key: 'espadas', label: 'Espadas' },
    { key: 'ouros',   label: 'Ouros' },
];

const DYN = [
    { key: 'engendrar',  kicker: 'Engendrar',   title: 'O que nasce deste encontro' },
    { key: 'conflito',   kicker: 'Conflito',    title: 'Onde as energias se opõem' },
    { key: 'estagnar',   kicker: 'Estagnação',  title: 'O que paralisa o fluxo' },
    { key: 'regressar',  kicker: 'Regressão',   title: 'O retorno a padrões antigos' },
    { key: 'necessitar', kicker: 'Necessidade', title: 'O que precisa ser integrado' },
];

async function loadData() {
    const fill = document.getElementById('ld-fill');
    const stat = document.getElementById('ld-status');
    try {
        stat.textContent = 'Carregando cartas...';
        const res = await fetch('cartas.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const total = +(res.headers.get('Content-Length') || 0);
        let loaded = 0;
        const chunks = [];
        const reader = res.body.getReader();
        const dec = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(dec.decode(value, { stream: true }));
            loaded += value.length;
            if (total) fill.style.width = Math.min(80, Math.round(loaded / total * 80)) + '%';
        }

        stat.textContent = 'Indexando...';
        fill.style.width = '90%';

        const data = JSON.parse(chunks.join(''));

        for (const c of data) {
            const cat = catOf(c.id);
            cardsById.set(c.id, { id: c.id, name: c.name, cat });
            cardsList.push({ id: c.id, name: c.name, cat, norm: norm(c.name) });
            if (c.interactions) {
                for (const inter of c.interactions) {
                    interactions.set(c.id + ':' + inter.target_id, inter.dynamics);
                }
            }
        }

        cardsList.sort((a, b) => (+a.id) - (+b.id));
        fill.style.width = '100%';
        stat.textContent = 'Pronto';
        return true;
    } catch (e) {
        stat.textContent = 'Erro ao carregar. Recarregue.';
        console.error(e);
        return false;
    }
}

/* ================================================
   STATE
   ================================================ */
const S = {
    s1: null,        // card id in slot 1
    s2: null,        // card id in slot 2
    active: null,    // 1, 2, or null (which slot is receiving next pick)
    pkFilter: 'todos',
    pkSearch: '',
    hist: [],
};

const HIST_KEY = 'tq_hist';
const HIST_MAX = 40;
const OB_KEY = 'tq_ob';

/* ================================================
   HASH ROUTING
   ================================================ */
function readHash() {
    const h = location.hash.replace(/^#\/?/, '');
    if (!h) return [null, null];
    const p = h.split('/');
    return [
        p[0] && cardsById.has(p[0]) ? p[0] : null,
        p[1] && cardsById.has(p[1]) ? p[1] : null,
    ];
}

function writeHash(id1, id2) {
    let h = '#/';
    if (id1) h += id1;
    if (id1 && id2) h += '/' + id2;
    if (location.hash !== h) history.pushState(null, '', h);
}

function onHash() {
    const [a, b] = readHash();
    S.s1 = a;
    S.s2 = b;
    if (a && b) {
        S.active = null;
        addHist(a, b);
    } else if (a && !b) {
        S.active = 2;
    } else if (!a && b) {
        S.active = 1;
    } else {
        S.active = 1;
    }
    render();
}

/* ================================================
   HISTORY
   ================================================ */
function loadHist() {
    try { S.hist = JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch(e) { S.hist = []; }
}

function saveHist() {
    try { localStorage.setItem(HIST_KEY, JSON.stringify(S.hist)); } catch(e) {}
}

function addHist(a, b) {
    const idx = S.hist.findIndex(h => h.a === a && h.b === b);
    if (idx >= 0) S.hist.splice(idx, 1);
    S.hist.unshift({ a, b, t: Date.now() });
    if (S.hist.length > HIST_MAX) S.hist.length = HIST_MAX;
    saveHist();
}

function clearHist() {
    S.hist = [];
    saveHist();
    renderHistory();
}

function timeAgo(ts) {
    const d = Date.now() - ts;
    const m = Math.floor(d / 60000);
    if (m < 1) return 'agora';
    if (m < 60) return m + ' min';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h';
    return Math.floor(h / 24) + 'd';
}

/* ================================================
   RENDER
   ================================================ */
function render() {
    renderSlots();
    renderReading();
    renderShareBtn();
    renderSidebar();
}

function renderSlots() {
    rSlot(1, S.s1);
    rSlot(2, S.s2);
    const sw = document.getElementById('swap-btn');
    sw.classList.toggle('active', !!(S.s1 && S.s2));
}

function rSlot(n, id) {
    const el = document.getElementById('slot' + n);
    const nm = document.getElementById('s' + n + 'name');
    if (id && cardsById.has(id)) {
        const c = cardsById.get(id);
        nm.textContent = c.name;
        el.classList.add('filled');
    } else {
        nm.textContent = '';
        el.classList.remove('filled');
    }
    el.classList.toggle('active', S.active === n);
}

function renderShareBtn() {
    document.getElementById('share-btn').style.display = (S.s1 && S.s2) ? '' : 'none';
}

function renderReading() {
    const box = document.getElementById('reading');
    const scroll = document.getElementById('reading-scroll');

    // Empty state
    if (!S.s1 && !S.s2) {
        box.innerHTML =
            '<div class="empty">' +
                '<div class="empty-mark">&#10037;</div>' +
                '<h2>Sua leitura começa aqui</h2>' +
                '<p>Escolha duas cartas do tarô para revelar as cinco dinâmicas ocultas entre elas. A ordem importa.</p>' +
                '<button class="empty-cta" onclick="onSlotClick(1)">Escolher primeira carta</button>' +
                '<span class="empty-or">ou</span>' +
                '<button class="empty-random" onclick="doRandom()">Tirada aleatória</button>' +
            '</div>';
        scroll.scrollTop = 0;
        return;
    }

    // Partial state
    if (!S.s1 || !S.s2) {
        const cid = S.s1 || S.s2;
        const c = cardsById.get(cid);
        box.innerHTML =
            '<div class="partial">' +
                '<p>' + esc(c.name) + ' aguarda uma companhia.</p>' +
            '</div>';
        scroll.scrollTop = 0;
        return;
    }

    // Full reading
    const c1 = cardsById.get(S.s1);
    const c2 = cardsById.get(S.s2);
    const dyn = interactions.get(S.s1 + ':' + S.s2);

    let html =
        '<div class="rdg-header">' +
            '<div class="rdg-kicker">Leitura</div>' +
            '<div class="rdg-pair">' + esc(c1.name) + '<span class="arr">&rarr;</span>' + esc(c2.name) + '</div>' +
            '<div class="rdg-sub">A influência de ' + esc(c1.name) + ' sobre ' + esc(c2.name) + '</div>' +
        '</div>';

    if (dyn) {
        for (const d of DYN) {
            if (!dyn[d.key]) continue;
            html +=
                '<div class="dyn">' +
                    '<div class="dyn-kicker">' + d.kicker + '</div>' +
                    '<div class="dyn-title">' + d.title + '</div>' +
                    '<div class="dyn-text">' + esc(dyn[d.key]) + '</div>' +
                '</div>';
        }
    } else {
        html +=
            '<div class="partial" style="padding-top:48px">' +
                '<p>Combinação ainda não catalogada.</p>' +
            '</div>';
    }

    // Explore section
    html += buildExplore(c1, c2);

    box.innerHTML = html;
    scroll.scrollTop = 0;
}

function buildExplore(c1, c2) {
    let h = '<div class="explore-section">' +
        '<div class="explore-title">Explorar</div>';

    // Swap
    h += '<button class="explore-swap" onclick="doSwap()">' +
            '<div class="explore-swap-label">Inverter a leitura</div>' +
            '<div class="explore-swap-pair">' + esc(c2.name) + ' <span class="arr">&rarr;</span> ' + esc(c1.name) + '</div>' +
         '</button>';

    // Related with card 1
    const rel1 = getSuggestions(c1.id, c2.id);
    if (rel1.length) {
        h += '<div class="explore-group">' +
            '<div class="explore-group-title">Outras com ' + esc(c1.name) + '</div>' +
            '<div class="explore-links">';
        for (const r of rel1) {
            h += '<button class="explore-link" onclick="goPair(\'' + c1.id + '\',\'' + r.id + '\')">' + esc(r.name) + '</button>';
        }
        h += '</div></div>';
    }

    // Related with card 2
    const rel2 = getSuggestions(c2.id, c1.id);
    if (rel2.length) {
        h += '<div class="explore-group">' +
            '<div class="explore-group-title">Outras com ' + esc(c2.name) + '</div>' +
            '<div class="explore-links">';
        for (const r of rel2) {
            h += '<button class="explore-link" onclick="goPair(\'' + r.id + '\',\'' + c2.id + '\')">' + esc(r.name) + '</button>';
        }
        h += '</div></div>';
    }

    h += '</div>';
    return h;
}

function getSuggestions(cardId, excludeId) {
    const n = +cardId;
    const cats = ['maiores', 'copas', 'paus', 'espadas', 'ouros'];
    const result = [];
    for (const cat of cats) {
        if (result.length >= 4) break;
        const pool = cardsList.filter(c => c.cat === cat && c.id !== cardId && c.id !== excludeId);
        if (pool.length) {
            result.push(pool[n % pool.length]);
        }
    }
    return result;
}

function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ================================================
   SIDEBAR (desktop)
   ================================================ */
function initSidebar() {
    // Filters
    const fc = document.getElementById('sb-filters');
    fc.innerHTML = CATS.map(c =>
        '<button class="sb-filter-btn' + (c.key === 'todos' ? ' active' : '') + '" data-f="' + c.key + '">' + c.label + '</button>'
    ).join('');
    fc.addEventListener('click', e => {
        const b = e.target.closest('[data-f]');
        if (!b) return;
        S.pkFilter = b.dataset.f;
        fc.querySelectorAll('.sb-filter-btn').forEach(x => x.classList.toggle('active', x === b));
        renderSbGrid();
    });

    // Search
    let sbt;
    document.getElementById('sb-search').addEventListener('input', e => {
        clearTimeout(sbt);
        sbt = setTimeout(() => { S.pkSearch = norm(e.target.value.trim()); renderSbGrid(); }, 100);
    });
}

function renderSidebar() {
    renderSbGrid();
    renderSbHint();
    renderSbHistory();
}

function renderSbHint() {
    const hint = document.getElementById('sb-hint');
    if (S.active) {
        hint.textContent = 'Escolhendo para posição ' + S.active;
        hint.classList.add('visible');
    } else {
        hint.classList.remove('visible');
    }
}

function renderSbGrid() {
    const grid = document.getElementById('sb-grid');
    const filtered = getFiltered();
    if (!filtered.length) {
        grid.innerHTML = '<div class="sb-empty">Nenhuma carta encontrada</div>';
        return;
    }
    grid.innerHTML = filtered.map(c => {
        const cls = (c.id === S.s1 || c.id === S.s2) ? ' in-use' : '';
        return '<button class="sb-card-btn' + cls + '" data-id="' + c.id + '">' + esc(c.name) + '</button>';
    }).join('');
}

function renderSbHistory() {
    const box = document.getElementById('sb-history');
    if (!S.hist.length) {
        box.innerHTML = '<div class="sb-empty">Nenhuma leitura ainda</div>';
        return;
    }
    box.innerHTML = S.hist.slice(0, 15).map(h => {
        const a = cardsById.get(h.a);
        const b = cardsById.get(h.b);
        if (!a || !b) return '';
        return '<button class="sb-history-item" onclick="goPair(\'' + h.a + '\',\'' + h.b + '\')">' +
            '<div class="sb-history-pair">' + esc(a.name) + ' <span class="arr">&rarr;</span> ' + esc(b.name) + '</div>' +
            '<div class="sb-history-time">' + timeAgo(h.t) + '</div>' +
        '</button>';
    }).join('');
}

// Click delegation for sidebar grid
document.getElementById('sb-scroll').addEventListener('click', e => {
    const btn = e.target.closest('[data-id]');
    if (!btn) return;
    pickCard(btn.dataset.id);
});

/* ================================================
   MOBILE PICKER
   ================================================ */
function initPicker() {
    const fc = document.getElementById('pk-filters');
    fc.innerHTML = CATS.map(c =>
        '<button class="pk-filter' + (c.key === 'todos' ? ' active' : '') + '" data-f="' + c.key + '">' + c.label + '</button>'
    ).join('');
    fc.addEventListener('click', e => {
        const b = e.target.closest('[data-f]');
        if (!b) return;
        S.pkFilter = b.dataset.f;
        fc.querySelectorAll('.pk-filter').forEach(x => x.classList.toggle('active', x === b));
        renderPkGrid();
    });

    let pkt;
    document.getElementById('pk-search').addEventListener('input', e => {
        clearTimeout(pkt);
        pkt = setTimeout(() => { S.pkSearch = norm(e.target.value.trim()); renderPkGrid(); }, 100);
    });

    document.getElementById('pk-grid').addEventListener('click', e => {
        const btn = e.target.closest('[data-id]');
        if (!btn) return;
        pickCard(btn.dataset.id);
        closePicker();
    });
}

function openPicker(slotNum) {
    S.active = slotNum;
    S.pkSearch = '';
    const overlay = document.getElementById('picker');
    document.getElementById('pk-title').textContent = 'Carta ' + slotNum;
    document.getElementById('pk-search').value = '';
    renderPkGrid();
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('pk-search').focus(), 320);
}

function closePicker() {
    document.getElementById('picker').classList.remove('open');
}

function renderPkGrid() {
    const grid = document.getElementById('pk-grid');
    const filtered = getFiltered();
    if (!filtered.length) {
        grid.innerHTML = '<div class="pk-empty">Nenhuma carta encontrada</div>';
        return;
    }
    grid.innerHTML = filtered.map(c => {
        const cls = (c.id === S.s1 || c.id === S.s2) ? ' in-use' : '';
        return '<button class="pk-card' + cls + '" data-id="' + c.id + '">' + esc(c.name) + '</button>';
    }).join('');
}

function getFiltered() {
    let list = cardsList;
    if (S.pkFilter !== 'todos') list = list.filter(c => c.cat === S.pkFilter);
    if (S.pkSearch) list = list.filter(c => c.norm.includes(S.pkSearch));
    return list;
}

/* ================================================
   CARD ACTIONS
   ================================================ */
function onSlotClick(n) {
    // On desktop: just activate the slot (sidebar is the picker)
    // On mobile: open fullscreen picker
    S.active = n;
    if (window.innerWidth >= 1024) {
        render();
        document.getElementById('sb-search').focus();
    } else {
        openPicker(n);
    }
}

function pickCard(id) {
    // Prevent same card in both slots
    if (S.active === 1 && S.s2 === id) {
        toast('Esta carta já está na posição 2');
        return;
    }
    if (S.active === 2 && S.s1 === id) {
        toast('Esta carta já está na posição 1');
        return;
    }

    if (S.active === 1) {
        S.s1 = id;
        if (!S.s2) S.active = 2; else S.active = null;
    } else if (S.active === 2) {
        S.s2 = id;
        if (!S.s1) S.active = 1; else S.active = null;
    } else {
        // No active slot — default to slot 1
        S.s1 = id;
        S.active = 2;
    }

    writeHash(S.s1, S.s2);
    if (S.s1 && S.s2) addHist(S.s1, S.s2);
    render();

    // Auto-open picker for slot 2 on mobile
    if (S.active === 2 && window.innerWidth < 1024) {
        setTimeout(() => openPicker(2), 350);
    }
}

function removeCard(n) {
    if (n === 1) S.s1 = null; else S.s2 = null;
    S.active = n;
    writeHash(S.s1, S.s2);
    render();
}

function doSwap() {
    if (!S.s1 || !S.s2) return;
    [S.s1, S.s2] = [S.s2, S.s1];
    S.active = null;
    writeHash(S.s1, S.s2);
    addHist(S.s1, S.s2);
    render();
    toast('Ordem invertida');
}

function goPair(a, b) {
    S.s1 = a;
    S.s2 = b;
    S.active = null;
    writeHash(a, b);
    addHist(a, b);
    render();
}

function doRandom() {
    const ids = cardsList.map(c => c.id);
    const i = Math.floor(Math.random() * ids.length);
    let j;
    do { j = Math.floor(Math.random() * ids.length); } while (j === i);
    goPair(ids[i], ids[j]);
}

/* ================================================
   SHARE
   ================================================ */
function doShare() {
    const url = location.href;
    if (navigator.share && S.s1 && S.s2) {
        const a = cardsById.get(S.s1), b = cardsById.get(S.s2);
        navigator.share({ title: 'Tarô Quebrado', text: a.name + ' → ' + b.name, url }).catch(() => {});
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => toast('Link copiado')).catch(() => toast('Erro ao copiar'));
    }
}

/* ================================================
   HISTORY PANEL (mobile)
   ================================================ */
function toggleHistory() {
    const shade = document.getElementById('hist-shade');
    const isOpen = shade.classList.contains('open');
    if (isOpen) {
        shade.classList.remove('open');
    } else {
        renderHistory();
        shade.classList.add('open');
    }
}

function renderHistory() {
    const list = document.getElementById('hist-list');
    if (!S.hist.length) {
        list.innerHTML = '<div class="hist-empty">Nenhuma leitura ainda</div>';
        return;
    }
    list.innerHTML = S.hist.map(h => {
        const a = cardsById.get(h.a), b = cardsById.get(h.b);
        if (!a || !b) return '';
        return '<button class="hist-item" onclick="goPair(\'' + h.a + '\',\'' + h.b + '\');toggleHistory()">' +
            '<div class="hist-pair">' + esc(a.name) + ' <span class="arr">&rarr;</span> ' + esc(b.name) + '</div>' +
            '<div class="hist-time">' + timeAgo(h.t) + '</div>' +
        '</button>';
    }).join('');
}

/* ================================================
   TOAST
   ================================================ */
let toastTimer;
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ================================================
   ONBOARDING
   ================================================ */
function checkOnboard() {
    try {
        if (!localStorage.getItem(OB_KEY)) {
            document.getElementById('onboard').classList.add('show');
        }
    } catch(e) {}
}

function closeOnboard() {
    document.getElementById('onboard').classList.remove('show');
    try { localStorage.setItem(OB_KEY, '1'); } catch(e) {}
}

/* ================================================
   KEYBOARD
   ================================================ */
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        if (document.getElementById('picker').classList.contains('open')) return closePicker();
        if (document.getElementById('hist-shade').classList.contains('open')) return toggleHistory();
    }
});

/* ================================================
   INIT
   ================================================ */
async function init() {
    const ok = await loadData();
    if (!ok) return;

    document.getElementById('loader').classList.add('out');
    setTimeout(() => document.getElementById('loader').style.display = 'none', 600);

    document.getElementById('app').classList.add('visible');

    loadHist();
    initSidebar();
    initPicker();

    const [a, b] = readHash();
    S.s1 = a;
    S.s2 = b;
    if (a && b) { S.active = null; addHist(a, b); }
    else if (a) S.active = 2;
    else S.active = 1;

    render();

    window.addEventListener('hashchange', onHash);
    window.addEventListener('popstate', onHash);

    checkOnboard();
}

init();
</script>
</body>
</html>
